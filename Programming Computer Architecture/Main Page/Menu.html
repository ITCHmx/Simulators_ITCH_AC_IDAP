<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Simulador Mapache</title>

    <link rel="icon"
        href="Programacion Arquitectura de Computadoras\Programacion Arquitectura de Computadoras\Pagina_Principal\cute-raccoon-face-wild-animal-character-in-animated-cartoon-illustration-vector.png"
        type="image/x-icon">
    <style>
        /* --- ESTILOS ORIGINALES --- */
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .fondo {
            width: 100vw;
            height: 100vh;
            background-image: url('Mapaches.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ventana-menu {
            background-color: rgba(255, 255, 255, 0.4);
            padding: 50px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 300px;
        }

        .boton {
            background-color: #004a99;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: background-color 0.3s, transform 0.1s;
            outline: none;
        }

        .boton:hover {
            background-color: #007bff;
        }

        .boton:active {
            transform: scale(0.98);
        }

        /* --- ESTILOS PARA EL POPUP ANIMADO --- */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .popup {
            background: white;
            padding: 35px;
            border-radius: 20px;
            text-align: center;
            min-width: 280px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            opacity: 0;
            transform: scale(0.7);
            transition: opacity 0.4s ease, transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .overlay.active .popup {
            opacity: 1;
            transform: scale(1);
        }

        .popup h2 {
            margin-top: 0;
            color: #004a99;
            margin-bottom: 25px;
        }

        .contenedor-botones-popup {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .contenedor-botones-popup .boton {
            font-size: 16px;
            padding: 12px;
        }

        .btn-cerrar {
            margin-top: 25px;
            background: #f4f4f4;
            color: #333;
            border: 1px solid #ddd;
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn-cerrar:hover {
            background: #e0e0e0;
        }
    </style>
</head>

<body>

    <div class="fondo">
        <div class="ventana-menu">
            <button class="boton" onclick="abrirModal('unidad4')">Unit 4 Practices</button>
            <button class="boton" onclick="abrirModal('unidad3')">Unit 3 Practices</button>
            <button class="boton" onclick="abrirModal('unidad2')">Unit 2 Practices</button>
        </div>
    </div>

    <!-- Estructura del Popup -->
    <div id="miOverlay" class="overlay">
        <div class="popup">
            <h2 id="tituloPopup">Título</h2>
            <div id="contenidoPopup" class="contenedor-botones-popup">
                <!-- Contenido dinámico aquí -->
            </div>
            <button class="btn-cerrar" onclick="cerrarModal()">Close</button>
        </div>
    </div>

    <script>
        const overlay = document.getElementById('miOverlay');
        const titulo = document.getElementById('tituloPopup');
        const contenido = document.getElementById('contenidoPopup');

        function abrirModal(unidad) {
            // 1. Limpiar contenido anterior
            contenido.innerHTML = "";

            // 2. Preparar el contenido según la unidad
            if (unidad === 'unidad2') {
                titulo.innerText = "Unit 2: Available Practices";

                const btn1 = document.createElement('button');
                btn1.className = 'boton';
                btn1.innerText = "Practice 1: Inputs/Outputs";
                btn1.onclick = () => window.location.href = 'https://itchmx.github.io/Simuladores_ITCH_AC_IDAP/Programacion%20Arquitectura%20de%20Computadoras/Unidad%202/Simulador_de_Salidas_Y_Entradas/Salidas%20y%20Entradas.html';

                const btn2 = document.createElement('button');
                btn2.className = 'boton';
                btn2.innerText = "Practice 2: Buses";
                btn2.onclick = () => window.location.href = 'https://itchmx.github.io/Simuladores_ITCH_AC_IDAP/Programacion%20Arquitectura%20de%20Computadoras/Unidad%202/Simulador_de_Buses/Buses.html';

                contenido.appendChild(btn1);
                contenido.appendChild(btn2);

            } else if (unidad === 'unidad3') {
                titulo.innerText = "Unit 3: Estructura y funcionamiento de la CPU";

                // Botón Práctica 1 - Unidad 3
                const btn1 = document.createElement('button');
                btn1.className = 'boton';
                btn1.innerText = "Practice 1: Introduction to CPU";
                btn1.onclick = () => window.location.href = 'https://itchmx.github.io/Simulators_ITCH_AC_IDAP/Programming%20Computer%20Architecture/Unit%203/Introduction%20to%20CPU.html'; // CAMBIAR ENLACE

                // Botón Práctica 2 - Unidad 3
                const btn2 = document.createElement('button');
                btn2.className = 'boton';
                btn2.innerText = "Practice 2: CPU Simulator";
                btn2.onclick = () => window.location.href = 'https://itchmx.github.io/Simulators_ITCH_AC_IDAP/Programming%20Computer%20Architecture/Unit%203/CPU_Simulator.html'; // CAMBIAR ENLACE

                contenido.appendChild(btn1);
                contenido.appendChild(btn2);

            } else if (unidad === 'unidad4') {
                titulo.innerText = "Unit 4: Parallel Processing";

                // Botón Práctica 1 - Unidad 4
                const btn1 = document.createElement('button');
                btn1.className = 'boton';
                btn1.innerText = "Practice 1: Introduction to Parallel Processing";
                btn1.onclick = () => window.location.href = 'https://itchmx.github.io/Simulators_ITCH_AC_IDAP/Programming%20Computer%20Architecture/Unit%204/Parallel%20Processing/Introduction%20to%20Parallel%20Processing.html'; // CAMBIAR ENLACE

                // Botón Práctica 2 - Unidad 4
                const btn2 = document.createElement('button');
                btn2.className = 'boton';
                btn2.innerText = "Practice 2: Parallel Process Simulator";
                btn2.onclick = () => window.location.href = 'https://itchmx.github.io/Simulators_ITCH_AC_IDAP/Programming%20Computer%20Architecture/Unit%204/Parallel%20Process%20Simulator/Parallel%20Process%20Simulator.html'; // CAMBIAR ENLACE

                contenido.appendChild(btn1);
                contenido.appendChild(btn2);
            }

            // 3. ACTIVAR LA ANIMACIÓN
            overlay.classList.add('active');
        }

        function cerrarModal() {
            overlay.classList.remove('active');
        }

        overlay.addEventListener('click', function (event) {
            if (event.target === overlay) {
                cerrarModal();
            }
        });
    </script>
</body>

</html>
