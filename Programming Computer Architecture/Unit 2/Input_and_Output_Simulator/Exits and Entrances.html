<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Raccoon Game I/O</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #000;
            overflow: hidden;
        }

        #escena {
            position: relative;
            width: 100%;
            height: 100vh;
        }

        #fondo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: -1;
            transition: opacity 0.2s ease;
        }

        /* Contenedor Personaje */
        #contenedor-personaje {
            position: absolute;
            bottom: 20px;
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            z-index: 1;
            transition: all 0.5s ease-in-out;
        }

        #personaje {
            height: 700px;
            /* Tamaño base unificado */
            background-color: transparent !important;
            margin-bottom: 15px;
            object-position: bottom center;
        }

        #mensaje {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px 30px;
            border-radius: 15px;
            font-size: 20px;
            font-weight: bold;
            color: #000;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
            max-width: 500px;
            text-align: center;
            position: relative;
        }

        #mensaje h1 {
            font-size: 22px;
            margin: 0 0 5px 0;
            color: #007BFF;
        }

        #mensaje h2 {
            font-size: 16px;
            margin: 0 0 5px 0;
            color: #333;
        }

        #mensaje::after {
            content: '';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 0 15px 15px;
            border-style: solid;
            border-color: transparent transparent rgba(255, 255, 255, 0.95);
        }

        /* Contenedor Simulador (660px x 462px) */
        #contenedor-simulador {
            position: absolute;
            top: 40px;
            right: 40px;
            width: 660px;
            height: 462px;
            background: rgba(15, 23, 42, 0.9);
            border: 3px solid #38bdf8;
            border-radius: 20px;
            display: none;
            flex-direction: column;
            z-index: 5;
            padding: 20px;
            color: white;
            font-family: 'Courier New', monospace;
            box-sizing: border-box;
        }

        #pnl-tecnico {
            font-size: 16px;
            color: #38bdf8;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 10px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #escenario-maestro {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .bloque {
            width: 170px;
            height: 75px;
            background: #334155;
            border: 2px solid #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border-radius: 8px;
            z-index: 5;
            transition: all 0.4s;
            font-size: 13px;
            text-align: center;
            position: absolute;
        }

        .iluminar-hw {
            background: #92400e !important;
            box-shadow: 0 0 20px #fbbf24 !important;
            border-color: #fbbf24 !important;
        }

        .iluminar-ctrl {
            background: #5b21b6 !important;
            box-shadow: 0 0 20px #a78bfa !important;
            border-color: #a78bfa !important;
        }

        .iluminar-cpu {
            background: #075985 !important;
            box-shadow: 0 0 20px #38bdf8 !important;
            border-color: #38bdf8 !important;
        }

        .iluminar-ram {
            background: #7e22ce !important;
            box-shadow: 0 0 20px #d946ef !important;
            border-color: #d946ef !important;
        }

        .iluminar-disco {
            background: #4d7c0f !important;
            box-shadow: 0 0 20px #84cc16 !important;
            border-color: #84cc16 !important;
        }

        .iluminar-mon {
            background: #064e3b !important;
            box-shadow: 0 0 20px #22c55e !important;
            border-color: #22c55e !important;
        }

        .iluminar-gpu {
            background: #9f1239 !important;
            box-shadow: 0 0 20px #fb7185 !important;
            border-color: #fb7185 !important;
        }

        .linea {
            position: absolute;
            background: #1e293b;
            border: 1px solid #334155;
            z-index: 1;
            transition: all 0.4s ease;
        }

        .activa {
            background: #fbbf24 !important;
            box-shadow: 0 0 15px #fbbf24 !important;
            border-color: #fbbf24 !important;
        }

        #dato {
            width: 20px;
            height: 20px;
            background: #fbbf24;
            position: absolute;
            z-index: 10;
            border-radius: 4px;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            display: none;
            box-shadow: 0 0 15px #fbbf24;
        }

        .btn-nav {
            position: absolute;
            left: 20px;
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: white;
            z-index: 10;
            transition: all 0.3s ease;
        }

        #btn-siguiente {
            bottom: 20px;
            background: #007BFF;
        }

        #btn-anterior {
            bottom: 90px;
            background: #6c757d;
        }

        .oculto {
            display: none;
        }
    </style>
</head>

<body onload="inicializarEscena()">

    <div id="escena">
        <img id="fondo" src="imagenes/Laboratorio_Entrada.jpg">

        <div id="contenedor-simulador">
            <div id="pnl-tecnico">Iniciando sistema...</div>
            <div id="escenario-maestro">
                <div class="bloque" id="b1"></div>
                <div class="bloque" id="b2"></div>
                <div class="bloque" id="b3"></div>
                <div class="bloque" id="b4"></div>
                <div class="bloque" id="b5"></div>
                <div class="bloque" id="b6"></div>

                <div class="linea" id="l1"></div>
                <div class="linea" id="l2"></div>
                <div class="linea" id="l3"></div>
                <div class="linea" id="l4"></div>
                <div class="linea" id="l5"></div>

                <div id="dato"></div>
            </div>
        </div>

        <div id="contenedor-personaje">
            <div id="mensaje"></div>
            <img id="personaje" src="">
        </div>
    </div>

    <button id="btn-siguiente" class="btn-nav">siguiente</button>
    <button id="btn-anterior" class="btn-nav oculto">Return</button>

    <script>
        const escenas = [
            { fondo: "imagenes/Laboratorio_Entrada.jpg", pers: "imagenes/Mapache_Saluda.png", msg: "Hi there, raccoons! Today we will look at a great topic: Input and Output (I/O).", titulo: "" },
            { fondo: "imagenes/Laboratorio_Puerta.jpg", pers: "imagenes/Mapache_Izquierda.png", msg: "To explain it better, let's head into the computer room.", titulo: "" },
            { fondo: "imagenes/Laboratorio.jpg", pers: "imagenes/Mapache_ManosAbiertas.png", msg: "But first, let's make this more lively.", titulo: "" },
            { fondo: "imagenes/Laboratorio_Animado.jpg", pers: "imagenes/Mapache_Explica_ConDedo.png", msg: "Now we're talking! This topic is divided into two parts: inputs and outputs.", titulo: "" },
            { fondo: "imagenes/Laboratorio_Animado.jpg", pers: "imagenes/Mapache_Explica_ConDedo.png", msg: "Inputs are devices that send information to the system, like the keyboard and the mouse.", titulo: "" },
            { fondo: "imagenes/Laboratorio_Animado.jpg", pers: "imagenes/Mapache_ManosAbiertas.png", msg: "Outputs are devices that show the results of processing, like the monitor and the printer.", titulo: "" },
            { fondo: "imagenes/Laboratorio_Computadora.jpg", pers: "imagenes/Mapache_ManosAbiertas.png", msg: "To understand it better, let's use one of the ITCH computers.", titulo: "" },
            { fondo: "imagenes/Laboratorio_Computadora.jpg", pers: "imagenes/Mapache_ManosAbiertas.png", msg: "But first, let's make it more fun! We'll connect the monitor, keyboard, and mouse, and see how it works with a simulator.", titulo: "" },
            { fondo: "imagenes/Laboratorio_Computadora.jpg", pers: "imagenes/Mapache_ManosAbiertas.png", msg: "First, let's connect the monitor.", titulo: "" },
            { fondo: "imagenes/Laboratorio_MonitorApagado.jpg", pers: "imagenes/Mapache_Explica_ConDedo.png", msg: "The monitor is an output device because it shows the data processed by the computer.", titulo: "" },
            { fondo: "imagenes/Laboratorio_MonitorApagado.jpg", pers: "imagenes/Mapache_ManosAbiertas.png", msg: "When you press the power button, a signal is sent that activates the flow of data to the screen.", titulo: "" },
            { fondo: "imagenes/Laboratorio_MonitorApagado.jpg", pers: "imagenes/Mapache_ManosAbiertas.png", msg: "To understand it better, press the monitor and watch the simulator!", titulo: "" },
            /* MONITOR 12-17 */
            { fondo: "imagenes/Laboratorio_MonitorApagado.jpg", pers: "imagenes/Mapache_Explica_ConDedo.png", msg: "Alright! We'll work with this simulator to understand it better.", titulo: "" },
            { fondo: "imagenes/Laboratorio_MonitorApagado.jpg", pers: "imagenes/Mapache_ManosAbiertas.png", msg: "Look! Here in the RAM, the colors and shapes of what we want to see are already stored.", titulo: "<h1>🖥️ Monitor Simulator</h1><h2>Step 1: Memory</h2>" },
            { fondo: "imagenes/Laboratorio_MonitorApagado.jpg", pers: "imagenes/Mapache_Explica_ConDedo.png", msg: "Attention! The Control Unit gives the order: 'Hey, Memory! Send that data to the monitor right now'.", titulo: "<h2>Step 2: CPU</h2>" },
            { fondo: "imagenes/Laboratorio_MonitorApagado.jpg", pers: "imagenes/Mapache_ManosAbiertas.png", msg: "Speed up! The data travels through the Data Bus. It's the internal highway that connects everything.", titulo: "<h2>Step 3: The Bus</h2>" },
            { fondo: "imagenes/Laboratorio_MonitorApagado.jpg", pers: "imagenes/Mapache_ManosAbiertas.png", msg: "Hold it right there! We're entering the Controller. He's the official translator who prepares the data.", titulo: "<h2>Step 4: Controller</h2>" },
            { fondo: "imagenes/Laboratorio_Monitor.jpg", pers: "imagenes/Mapache_Explica_ConDedo.png", msg: "It's here! The monitor receives the data and converts it into light. That's why it's an OUTPUT device.", titulo: "<h2>Step 5: Monitor</h2>" },
            /* MOUSE 18-28 */
            { fondo: "imagenes/Laboratorio_Monitor.jpg", pers: "imagenes/Mapache_ManosAbiertas.png", msg: "Now let's connect the mouse.", titulo: "" },
            { fondo: "imagenes/Laboratorio_Maus.jpg", pers: "imagenes/Mapache_ManosAbiertas.png", msg: "The mouse is an input device because it sends signals to the system.", titulo: "" },
            { fondo: "imagenes/Laboratorio_Maus.jpg", pers: "imagenes/Mapache_Explica_ConDedo.png", msg: "Every click generates data that travels through the bus to the CPU.", titulo: "" },
            { fondo: "imagenes/Laboratorio_Maus.jpg", pers: "imagenes/Mapache_Explica_ConDedo.png", msg: "To understand it better, press the mouse and watch the simulator!", titulo: "" },
            { fondo: "imagenes/Laboratorio_Maus.jpg", pers: "imagenes/Mapache_ManosAbiertas.png", msg: "Alright! Let's work with this simulator to understand it better.", titulo: "" },
            { fondo: "imagenes/Laboratorio_Maus.jpg", pers: "imagenes/Mapache_ManosAbiertas.png", msg: "Click! My optical sensors detect the change and generate an electrical signal.", titulo: "<h1>🖱️ Mouse Simulator</h1><h2>Step 1: Click</h2>" },
            { fondo: "imagenes/Laboratorio_Maus.jpg", pers: "imagenes/Mapache_Explica_ConDedo.png", msg: "The I/O Controller receives me! It converts my signal into bits and triggers an interrupt.", titulo: "<h2>Step 2: Interrupt</h2>" },
            { fondo: "imagenes/Laboratorio_Maus.jpg", pers: "imagenes/Mapache_ManosAbiertas.png", msg: "Straight to the brain! The CPU knows that click means you want to move something.", titulo: "<h2>Step 3: CPU</h2>" },
            { fondo: "imagenes/Laboratorio_Maus.jpg", pers: "imagenes/Mapache_Explica_ConDedo.png", msg: "The RAM temporarily saves the new coordinates of your file.", titulo: "<h2>Step 4: RAM</h2>" },
            { fondo: "imagenes/Laboratorio_Maus.jpg", pers: "imagenes/Mapache_Explica_ConDedo.png", msg: "The File System writes to the Hard Drive. It's official now!", titulo: "<h2>Step 5: Disk</h2>" },
            { fondo: "imagenes/Laboratorio_Maus.jpg", pers: "imagenes/Mapache_ManosAbiertas.png", msg: "We did it! The pixels light up on the Monitor. Look at how it landed!", titulo: "<h2>Step 6: Monitor</h2>" },
            /* TECLADO 29-39 */
            { fondo: "imagenes/Laboratorio_Maus.jpg", pers: "imagenes/Mapache_Saluda.png", msg: "Finally, let's connect the keyboard.", titulo: "" },
            { fondo: "imagenes/Laboratorio_Teclado.jpg", pers: "imagenes/Mapache_ManosAbiertas.png", msg: "The keyboard is also an input device.", titulo: "" },
            { fondo: "imagenes/Laboratorio_Teclado.jpg", pers: "imagenes/Mapache_Explica_ConDedo.png", msg: "When you press a key, the system interprets that instruction.", titulo: "" },
            { fondo: "imagenes/Laboratorio_Teclado.jpg", pers: "imagenes/Mapache_ManosAbiertas.png", msg: "To understand it better, press the keyboard and watch the simulator!", titulo: "" },
            { fondo: "imagenes/Laboratorio_Teclado.jpg", pers: "imagenes/Mapache_Explica_ConDedo.png", msg: "Alright! Let's work with this simulator to understand it better.", titulo: "" },
            { fondo: "imagenes/Laboratorio_Teclado.jpg", pers: "imagenes/Mapache_ManosAbiertas.png", msg: "Click! I generate a unique binary code. A secret letter for the computer.", titulo: "<h1>⌨️ Keyboard Simulator</h1><h2>Step 1: Key</h2>" },
            { fondo: "imagenes/Laboratorio_Teclado.jpg", pers: "imagenes/Mapache_Explica_ConDedo.png", msg: "The controller translates the signal and triggers an urgent interrupt.", titulo: "<h2>Step 2: Controller</h2>" },
            { fondo: "imagenes/Laboratorio_Teclado.jpg", pers: "imagenes/Mapache_ManosAbiertas.png", msg: "The CPU decodes the message: 'Instruction received!'.", titulo: "<h2>Step 3: CPU</h2>" },
            { fondo: "imagenes/Laboratorio_Teclado.jpg", pers: "imagenes/Mapache_Explica_ConDedo.png", msg: "To the RAM! I save the data in the Buffer so nothing gets lost.", titulo: "<h2>Step 4: RAM</h2>" },
            { fondo: "imagenes/Laboratorio_Teclado.jpg", pers: "imagenes/Mapache_ManosAbiertas.png", msg: "The Graphics Processor prepares the drawing of the letter.", titulo: "<h2>Step 5: GPU</h2>" },
            { fondo: "imagenes/Laboratorio_Teclado.jpg", pers: "imagenes/Mapache_ManosAbiertas.png", msg: "Done! The signal turns into light on the monitor.", titulo: "<h2>Step 6: Monitor</h2>" },
            { fondo: "imagenes/Laboratorio_Teclado.jpg", pers: "imagenes/Mapache_Saluda.png", msg: "And with that, you now know how the result is achieved. Thank you!", titulo: "<h1>🎮 End</h1>" }
        ];

        let indice = 0;
        const contenedor = document.getElementById("contenedor-personaje");
        const contenedorSim = document.getElementById("contenedor-simulador");
        const pnlTecnico = document.getElementById("pnl-tecnico");
        const dato = document.getElementById('dato');

        function resetSimulador() {
            dato.style.display = "none";
            pnlTecnico.innerText = "Sistema listo.";
            document.querySelectorAll('.bloque, .linea').forEach(el => {
                el.className = el.classList.contains('bloque') ? 'bloque' : 'linea';
                el.style.display = "none";
                el.innerText = "";
            });
        }

        function actualizarSimulador(num) {
            resetSimulador();

            // MONITOR (12-17)
            if (num >= 12 && num <= 17) {
                contenedorSim.style.display = "flex";
                const b1 = document.getElementById('b1'); b1.style = "display:flex; left:110px; top:50px;"; b1.innerText = "RAM";
                const b2 = document.getElementById('b2'); b2.style = "display:flex; left:340px; top:50px;"; b2.innerText = "CPU";
                const b4 = document.getElementById('b4'); b4.style = "display:flex; left:110px; top:210px;"; b4.innerText = "MONITOR";
                const b5 = document.getElementById('b5'); b5.style = "display:flex; left:340px; top:210px;"; b5.innerText = "I/O CONTROLLER";

                document.getElementById('l1').style = "display:block; left:280px; top:85px; width:60px; height:4px;";
                document.getElementById('l2').style = "display:block; left:425px; top:125px; width:4px; height:85px;";
                document.getElementById('l3').style = "display:block; left:280px; top:245px; width:60px; height:4px;";

                if (num == 12) pnlTecnico.innerText = "Output Simulator: Monitor";
                if (num >= 13) { b1.classList.add('iluminar-ram'); dato.style = "display:block; left:185px; top:77px;"; pnlTecnico.innerText = "RAM: Reading image data..."; }
                if (num >= 14) { b2.classList.add('iluminar-cpu'); document.getElementById('l1').classList.add('activa'); dato.style.left = "415px"; pnlTecnico.innerText = "CPU: Processing outgoing order..."; }
                if (num >= 15) { document.getElementById('l2').classList.add('activa'); dato.style.top = "155px"; dato.style.left = "417px"; pnlTecnico.innerText = "BUS: Data traveling to the controller..."; }
                if (num >= 16) { b5.classList.add('iluminar-ctrl'); dato.style.top = "237px"; pnlTecnico.innerText = "CONTROLLER: Converting signal..."; }
                if (num >= 17) { b4.classList.add('iluminar-mon'); document.getElementById('l3').classList.add('activa'); dato.style.left = "185px"; pnlTecnico.innerText = "MONITOR: Viewing information."; }
            }
            // MOUSE (22-28) & TECLADO (33-39)
            else if ((num >= 22 && num <= 28) || (num >= 33 && num <= 39)) {
                contenedorSim.style.display = "flex";
                const isMouse = (num <= 28);

                document.getElementById('b1').style = "display:flex; left:35px; top:50px;"; document.getElementById('b1').innerText = isMouse ? "MOUSE" : "KEYBOARD";
                document.getElementById('b2').style = "display:flex; left:225px; top:50px;"; document.getElementById('b2').innerText = isMouse ? "RAM" : "RAM (BUFFER)";
                document.getElementById('b3').style = "display:flex; left:415px; top:50px;"; document.getElementById('b3').innerText = isMouse ? "DISK" : "GPU / SW";
                document.getElementById('b4').style = "display:flex; left:35px; top:210px;"; document.getElementById('b4').innerText = "CTRLR I/O";
                document.getElementById('b5').style = "display:flex; left:225px; top:210px;"; document.getElementById('b5').innerText = "CPU (KERNEL)";
                document.getElementById('b6').style = "display:flex; left:415px; top:210px;"; document.getElementById('b6').innerText = "MONITOR";

                document.getElementById('l1').style = "display:block; left:118px; top:125px; width:4px; height:85px;";
                document.getElementById('l2').style = "display:block; left:205px; top:245px; width:20px; height:4px;";
                document.getElementById('l3').style = "display:block; left:308px; top:125px; width:4px; height:85px;";
                document.getElementById('l4').style = "display:block; left:395px; top:85px; width:20px; height:4px;";
                document.getElementById('l5').style = "display:block; left:498px; top:125px; width:4px; height:85px;";

                let step = isMouse ? num - 23 : num - 34;
                if (step == -1) pnlTecnico.innerText = isMouse ? "Mouse Simulator (Input)" : "Keyboard Simulator (Input)";
                if (step >= 0) { document.getElementById('b1').classList.add('iluminar-hw'); dato.style = "display:block; left:110px; top:77px;"; pnlTecnico.innerText = isMouse ? "Hardware: Click detected." : "Hardware: Key pressed."; }
                if (step >= 1) { document.getElementById('b4').classList.add('iluminar-ctrl'); document.getElementById('l1').classList.add('activa'); dato.style.top = "237px"; pnlTecnico.innerText = "Controller: Sending interrupt..."; }
                if (step >= 2) { document.getElementById('b5').classList.add('iluminar-cpu'); document.getElementById('l2').classList.add('activa'); dato.style.left = "300px"; pnlTecnico.innerText = "CPU: Managing Kernel Order."; }
                if (step >= 3) { document.getElementById('b2').classList.add('iluminar-ram'); document.getElementById('l3').classList.add('activa'); dato.style.top = "77px"; pnlTecnico.innerText = "RAM: Updating temporary memory."; }
                if (step >= 4) { document.getElementById('b3').classList.add(isMouse ? 'iluminar-disco' : 'iluminar-gpu'); document.getElementById('l4').classList.add('activa'); dato.style.left = "490px"; pnlTecnico.innerText = isMouse ? "Storage: Disk changes." : "GPU: Drawing character."; }
                if (step >= 5) { document.getElementById('b6').classList.add('iluminar-mon'); document.getElementById('l5').classList.add('activa'); dato.style.top = "237px"; pnlTecnico.innerText = "Monitor: Final result on screen."; }
            } else {
                contenedorSim.style.display = "none";
            }
        }

        function cambiarEscena(nuevoIndice) {
            indice = nuevoIndice;
            const escena = escenas[indice];
            const fondo = document.getElementById("fondo");
            const personaje = document.getElementById("personaje");
            const mensaje = document.getElementById("mensaje");

            fondo.style.opacity = 0;
            setTimeout(() => {
                fondo.src = escena.fondo;
                personaje.src = escena.pers;
                mensaje.innerHTML = (escena.titulo || "") + escena.msg;

                // --- ALTURA FIJA PARA EVITAR SALTOS ---
                personaje.style.height = "480px";

                contenedor.style.left = ""; contenedor.style.right = "";
                if (indice === 0) { contenedor.style.right = "50px"; }
                else if (indice === 1) { contenedor.style.left = "400px"; }
                else { contenedor.style.left = "200px"; }

                actualizarSimulador(indice);
                document.getElementById("btn-anterior").classList.toggle("oculto", indice === 0);
                document.getElementById("btn-siguiente").innerText = (indice === escenas.length - 1) ? "End" : "Next";
                fondo.style.opacity = 1;
            }, 150);
        }

        function inicializarEscena() { cambiarEscena(0); }
        document.getElementById("btn-siguiente").addEventListener("click", () => { if (indice < escenas.length - 1) cambiarEscena(indice + 1); });
        document.getElementById("btn-anterior").addEventListener("click", () => { if (indice > 0) cambiarEscena(indice - 1); });
    </script>
</body>

</html>
