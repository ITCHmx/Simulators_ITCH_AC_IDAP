<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Raccoon Buses Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #000;
            overflow: hidden;
        }

        #escena {
            position: relative;
            width: 100%;
            height: 100vh;
        }

        #fondo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: -1;
            transition: opacity 0.2s ease;
        }

        /* Contenedor para agrupar personaje y texto */
        #contenedor-personaje {
            position: absolute;
            bottom: 20px;
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            z-index: 1;
            transition: all 0.5s ease-in-out;
        }

        #personaje {
            /* TAMAÑO ÚNICO PARA TODAS LAS IMÁGENES */
            height: 500px;
            width: auto;
            /* Mantiene la proporción */
            background-color: transparent !important;
            margin-bottom: 15px;
            object-fit: contain;
            object-position: bottom center;
        }

        #mensaje {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px 30px;
            border-radius: 15px;
            font-size: 20px;
            font-weight: bold;
            color: #000;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
            max-width: 500px;
            text-align: center;
            position: relative;
        }

        #mensaje h2 {
            font-size: 18px;
            margin: 0 0 10px 0;
            color: #333;
        }

        /* Triangulito del bocadillo */
        #mensaje::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 15px 15px 0;
            border-style: solid;
            border-color: rgba(255, 255, 255, 0.95) transparent transparent;
        }

        /* Botones en la parte superior derecha */
        .btn-nav {
            position: absolute;
            top: 20px;
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            z-index: 10;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        #btn-siguiente {
            right: 20px;
            background: #007BFF;
        }

        #btn-anterior {
            right: 200px;
            background: #6c757d;
        }

        .btn-nav:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .btn-nav:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .oculto {
            display: none;
        }
    </style>
</head>

<body onload="inicializarEscena()">
    <div id="escena">
        <img id="fondo" src="Dinosaurio/imagenes/Fondo1.0.jpg" alt="Fondo">

        <div id="contenedor-personaje">
            <div id="mensaje">Cargando...</div>
            <img id="personaje" src="" alt="Mapache">
        </div>
    </div>

    <button id="btn-siguiente" class="btn-nav">Next</button>
    <button id="btn-anterior" class="btn-nav oculto">return</button>

    <script>
        const escenas = [
            { fondo: "Dinosaurio/imagenes/Fondo1.0.jpg", pers: "Dinosaurio/imagenes/Mapache_Saluda.png", msg: "Hi there, raccoons! Today we'll look at Input and Output (I/O) to understand how a system works from the inside.", titulo: "" },
            { fondo: "Dinosaurio/imagenes/Fondo1.jpg", pers: "Dinosaurio/imagenes/Mapache_ManosAbiertas.png", msg: "Input detected! 🐾 Your finger pressed the button and the I/O Module translated it into binary.", titulo: "<h2>1. The Moment of the Click</h2>" },
            { fondo: "Dinosaurio/imagenes/Fondo2.jpg", pers: "Dinosaurio/imagenes/Mapache_Explica_ConDedo.png", msg: "With Interrupts, I notify the CPU: 'Hey, stop everything, I need to jump!'.", titulo: "<h2>2. Check or Interrupt?</h2>" },
            { fondo: "Dinosaurio/imagenes/Fondo3.jpg", pers: "Dinosaurio/imagenes/Mapache_ManosAbiertas.png", msg: "Now we'll explain the different buses inside!", titulo: "<h2>3.0. The different buses</h2>" },
            { fondo: "Dinosaurio/imagenes/Fondo3.jpg", pers: "Dinosaurio/imagenes/Mapache_ManosAbiertas.png", msg: "Heavy load! 🚚 The Data Bus carries my coordinates and colors.", titulo: "<h2>3. The Data Bus</h2>" },
            { fondo: "Dinosaurio/imagenes/Fondo4.jpg", pers: "Dinosaurio/imagenes/Mapache_ManosAbiertas.png", msg: "The Address Bus indicates where in the RAM I am stored.", titulo: "<h2>4. The Address Bus</h2>" },
            { fondo: "Dinosaurio/imagenes/Fondo5.jpg", pers: "Dinosaurio/imagenes/Mapache_Explica_ConDedo.png", msg: "The traffic boss! 🚦 The Control Bus says: 'GPU, draw this frame!'.", titulo: "<h2>5. The Control Bus</h2>" },
            { fondo: "Dinosaurio/imagenes/Fondo6.jpg", pers: "Dinosaurio/imagenes/Mapache_ManosAbiertas.png", msg: "The System Bus connects the CPU to the RAM at full speed.", titulo: "<h2>6. System Bus</h2>" },
            { fondo: "Dinosaurio/imagenes/Fondo7.jpg", pers: "Dinosaurio/imagenes/Mapache_ManosAbiertas.png", msg: "Expansion buses (keyboard/mouse) are slower but reliable.", titulo: "<h2>7. Peripheral Bus</h2>" },
            { fondo: "Dinosaurio/imagenes/Fondo8.jpg", pers: "Dinosaurio/imagenes/Mapache_Explica_ConDedo.png", msg: "When you speed up, the interrupt travels faster than anything. Magic!", titulo: "<h2>8. Interrupts in Action</h2>" },
            { fondo: "Dinosaurio/imagenes/Fondo9.jpg", pers: "Dinosaurio/imagenes/Mapache_ManosAbiertas.png", msg: "With DMA, sound goes straight to the audio card without bothering the CPU.", titulo: "<h2>9. DMA and Channels</h2>" },
            { fondo: "Dinosaurio/imagenes/Fondo10.jpg", pers: "Dinosaurio/imagenes/Mapache_Explica_ConDedo.png", msg: "Look at those pixels! The GPU drew my landing. Successful output!", titulo: "<h2>10. Final Result</h2>" },
            { fondo: "Dinosaurio/imagenes/Fondo10.jpg", pers: "Dinosaurio/imagenes/Mapache_ManosAbiertas.png", msg: "It's official! We are updating the metadata on the hard drive.", titulo: "<h2>Step 11: Disk</h2>" },
            { fondo: "Dinosaurio/imagenes/Fondo11.jpg", pers: "Dinosaurio/imagenes/MapacheSalta.png", msg: "That's it! Now you know how a game works on the inside. Let's play!", titulo: "<h2>Interactive Game</h2>" }
        ];

        let indice = 0;
        const btnSig = document.getElementById("btn-siguiente");
        const btnAnt = document.getElementById("btn-anterior");
        const fondo = document.getElementById("fondo");
        const personaje = document.getElementById("personaje");
        const mensaje = document.getElementById("mensaje");
        const contenedor = document.getElementById("contenedor-personaje");

        function ajustarPosicionContenedor(numEscena) {
            contenedor.style.left = "auto";
            contenedor.style.right = "auto";
            contenedor.style.transform = "none";

            const posicion = numEscena % 3;
            if (posicion === 0) contenedor.style.right = "80px";
            else if (posicion === 1) {
                contenedor.style.left = "50%";
                contenedor.style.transform = "translateX(-50%)";
            }
            else contenedor.style.left = "80px";
        }

        function actualizarUI() {
            if (indice > 0) btnAnt.classList.remove("oculto");
            else btnAnt.classList.add("oculto");
            btnSig.innerText = (indice === escenas.length - 1) ? "Finish" : "Next";
        }

        function cambiarEscena(nuevoIndice) {
            indice = nuevoIndice;
            const escena = escenas[indice];
            fondo.style.opacity = 0;

            setTimeout(() => {
                fondo.src = escena.fondo;
                personaje.src = escena.pers;
                mensaje.innerHTML = (escena.titulo || "") + escena.msg;
                ajustarPosicionContenedor(indice);
                actualizarUI();
                fondo.style.opacity = 1;
            }, 150);
        }

        function inicializarEscena() {
            cambiarEscena(0);
        }

        btnSig.addEventListener("click", () => {
            if (indice < escenas.length - 1) cambiarEscena(indice + 1);
            else alert("Congratulations, Raccoon and Systems expert!");
        });

        btnAnt.addEventListener("click", () => {
            if (indice > 0) cambiarEscena(indice - 1);
        });
    </script>
</body>

</html>
